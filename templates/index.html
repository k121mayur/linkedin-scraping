<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LinkedIn Job Scraper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet">
    <style>
      :root {
        color-scheme: light;
        --bg-gradient: radial-gradient(circle at top left, #0f172a, #111827);
        --card-gradient: linear-gradient(135deg, rgba(38, 70, 83, 0.35), rgba(8, 151, 157, 0.25));
        --accent: #0ea5e9;
        --accent-strong: #38bdf8;
        --text-primary: #f9fafb;
        --text-secondary: rgba(248, 250, 252, 0.7);
        --error: #f87171;
        font-size: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Poppins', sans-serif;
        background: var(--bg-gradient);
        color: var(--text-primary);
        padding: 2rem 1rem;
      }

      .card {
        width: min(640px, 100%);
        border-radius: 24px;
        padding: clamp(2rem, 4vw, 3rem);
        backdrop-filter: blur(18px);
        background: var(--card-gradient);
        border: 1px solid rgba(148, 163, 184, 0.25);
        box-shadow: 0 30px 70px -20px rgba(15, 23, 42, 0.8);
        position: relative;
        overflow: hidden;
      }

      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at top right, rgba(14, 165, 233, 0.25), transparent 55%);
        pointer-events: none;
      }

      header {
        display: flex;
        gap: 1.5rem;
        align-items: center;
        margin-bottom: 2.5rem;
        position: relative;
        z-index: 1;
      }

      .logo-space {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        border: 1px dashed rgba(148, 163, 184, 0.4);
        display: grid;
        place-items: center;
        background: rgba(15, 23, 42, 0.4);
        color: var(--text-secondary);
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.14rem;
        padding: 0;
        overflow: clip;
      }

      h1 {
        font-size: clamp(1.75rem, 3vw, 2.4rem);
        font-weight: 600;
        margin: 0;
      }

      .subtitle {
        margin: 0.5rem 0 0;
        color: var(--text-secondary);
        font-weight: 400;
        max-width: 32ch;
      }

      .brand-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background-color: rgba(14, 165, 233, 0.12);
        color: var(--accent-strong);
        padding: 0.4rem 0.9rem;
        border-radius: 999px;
        font-size: 1.5rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        margin-bottom: 1rem;
      }

      form {
        display: grid;
        gap: 1.5rem;
        position: relative;
        z-index: 1;
      }

      label {
        display: grid;
        gap: 0.7rem;
        font-size: 0.95rem;
        color: var(--text-secondary);
        letter-spacing: 0.02em;
      }

      input[type="text"] {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 1rem 1.2rem;
        background: rgba(15, 23, 42, 0.6);
        box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.2);
        color: var(--text-primary);
        font-size: 1rem;
        transition: box-shadow 160ms ease, transform 160ms ease;
      }

      input[type="text"]:focus {
        outline: none;
        box-shadow: inset 0 0 0 2px rgba(14, 165, 233, 0.7), 0 0 0 4px rgba(14, 165, 233, 0.15);
        transform: translateY(-2px);
      }

      button {
        justify-self: start;
        border: none;
        border-radius: 14px;
        padding: 0.95rem 2.4rem;
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        color: #0b1120;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        box-shadow: 0 18px 30px -15px rgba(14, 165, 233, 0.9);
        cursor: pointer;
        transition: transform 150ms ease, box-shadow 150ms ease;
      }

      button:hover {
        transform: translateY(-3px);
        box-shadow: 0 22px 40px -15px rgba(14, 165, 233, 1);
      }

      button:active {
        transform: translateY(-1px);
      }

      .error-box {
        padding: 1rem 1.25rem;
        border-radius: 12px;
        background: rgba(248, 113, 113, 0.12);
        border: 1px solid rgba(248, 113, 113, 0.35);
        color: var(--error);
        font-size: 0.95rem;
      }

      footer {
        margin-top: 2.5rem;
        text-align: center;
        font-size: 0.85rem;
        color: var(--text-secondary);
        position: relative;
        z-index: 1;
      }

      footer a {
        color: var(--accent-strong);
        text-decoration: none;
        font-weight: 500;
      }

      footer a:hover {
        text-decoration: underline;
      }
      image {
        height: auto;
        width: auto;
        max-width: 100%;
        max-height: 100%;
      }
      .loader-overlay {
        position: absolute;
        inset: 0;
        background: rgba(15, 23, 42, 0.92);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.4rem;
        text-align: center;
        padding: 2rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      .loader-overlay.active {
        opacity: 1;
        pointer-events: all;
      }

      .loader-spinner {
        width: 56px;
        height: 56px;
        border: 4px solid rgba(148, 163, 184, 0.25);
        border-top-color: var(--accent-strong);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loader-message {
        max-width: 34ch;
        color: var(--text-primary);
        font-size: 1.05rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <header>
        <div class="logo-space">
          <img src="/static/tpo_logo.jpg" alt="LinkedIn Logo" width="72" height="72">
        </div>
        <div>
          <span class="brand-pill">The People Order</span>
          <h1>LinkedIn Job Scraper</h1>
          <p class="subtitle">Curate rich job intelligence in seconds. Choose
            your role and location and let the magic happen.</p>
        </div>
      </header>

      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}

      <form method="post" novalidate>
        <label>
          Job Title
          <input
            type="text"
            name="keyword"
            placeholder="e.g. Growth Product Manager"
            value="{{ keyword }}"
            required>
        </label>
        <label>
          Location
          <input
            type="text"
            name="location"
            placeholder="e.g. Berlin, Germany"
            value="{{ location }}"
            required>
        </label>
        <button type="submit">Start Scraping</button>
      </form>

      <footer>
        Powered by <a href="https://www.siliconmango.com" target="_blank"
          rel="noopener">Silicon Mango</a>
      </footer>
      <div id="loader" class="loader-overlay" aria-hidden="true">
        <div class="loader-spinner" role="presentation"></div>
        <p class="loader-message">We are scraping the jobs, please have a cup of coffee till then.</p>
      </div>
    </div>
    <script>
      const form = document.querySelector("form");
      const loader = document.getElementById("loader");
      const submitButton = form?.querySelector('button[type="submit"]');

      if (form && loader && submitButton) {
        form.addEventListener("submit", () => {
          submitButton.disabled = true;
          submitButton.textContent = "Scraping...";
          loader.classList.add("active");
          loader.setAttribute("aria-hidden", "false");
        });
      }
    </script>
  </body>
</html>
