<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkedIn Job Scraper — Prompt-Driven</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --card-bg: linear-gradient(135deg, rgba(38,70,83,0.35), rgba(8,151,157,0.25));
      --accent: #0ea5e9;
      --accent-strong: #38bdf8;
      --text: #f9fafb;
      --text-muted: rgba(248,250,252,0.7);
      --error: #f87171;
      --success: #4ade80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top left, #0f172a, #111827);
      color: var(--text);
      padding: 2rem 1rem;
    }
    .card {
      width: min(680px, 100%);
      border-radius: 24px;
      padding: clamp(2rem, 4vw, 3rem);
      backdrop-filter: blur(18px);
      background: var(--card-bg);
      border: 1px solid rgba(148,163,184,0.25);
      box-shadow: 0 30px 70px -20px rgba(15,23,42,0.8);
    }
    h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 0.5rem; }
    .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
    form { display: grid; gap: 1.2rem; }
    label { display: grid; gap: 0.5rem; font-size: 0.9rem; color: var(--text-muted); }
    textarea {
      width: 100%;
      min-height: 100px;
      border-radius: 14px;
      padding: 1rem 1.2rem;
      background: rgba(15,23,42,0.6);
      border: 1px solid rgba(148,163,184,0.2);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
      transition: border-color 160ms;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
    }
    .row { display: flex; gap: 1rem; align-items: center; }
    input[type="number"] {
      width: 100px;
      border-radius: 14px;
      padding: 0.7rem 1rem;
      background: rgba(15,23,42,0.6);
      border: 1px solid rgba(148,163,184,0.2);
      color: var(--text);
      font-size: 1rem;
    }
    input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      justify-self: start;
      border: none;
      border-radius: 14px;
      padding: 0.95rem 2.4rem;
      font-size: 1.05rem;
      font-weight: 600;
      color: #0b1120;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 18px 30px -15px rgba(14,165,233,0.9);
      cursor: pointer;
      transition: transform 150ms, box-shadow 150ms;
    }
    button:hover { transform: translateY(-2px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-box {
      padding: 1rem 1.25rem;
      border-radius: 12px;
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.35);
      color: var(--error);
      margin-bottom: 1rem;
    }
    [hidden] { display: none !important; }
    .progress-section {
      margin-top: 1.5rem;
      padding: 1.5rem;
      border-radius: 14px;
      background: rgba(15,23,42,0.4);
      border: 1px solid rgba(148,163,184,0.15);
    }
    .progress-bar {
      height: 8px;
      border-radius: 4px;
      background: rgba(148,163,184,0.15);
      margin: 0.8rem 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .progress-info { font-size: 0.9rem; color: var(--text-muted); }
    .download-links { display: flex; gap: 0.8rem; margin-top: 1rem; flex-wrap: wrap; }
    .dl-btn {
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent-strong);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 150ms;
    }
    .dl-btn:hover { background: rgba(14,165,233,0.12); }
    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
<div class="card">
  <h1>Prompt-Driven LinkedIn Scraper</h1>
  <p class="subtitle">Describe what you need in plain English — we'll find the right jobs.</p>

  <div id="error" class="error-box" hidden></div>

  <form id="scrape-form">
    <label>
      What jobs are you looking for?
      <textarea id="prompt" name="prompt" placeholder="e.g. Extract the Jobs in NGO sector for accountant role or junior-level financial roles in India" required></textarea>
    </label>
    <div class="row">
      <label>
        Max jobs
        <input type="number" id="max-jobs" name="max_jobs" value="100" min="5" max="500">
      </label>
      <button type="submit" id="submit-btn">Start Scraping</button>
    </div>
  </form>

  <div id="progress" class="progress-section" hidden>
    <div class="progress-info" id="progress-text">Initializing...</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-info" id="progress-detail"></div>
    <div class="download-links" id="download-links" hidden>
      <a class="dl-btn" id="dl-xlsx" href="#">Download XLSX</a>
      <a class="dl-btn" id="dl-csv" href="#">Download CSV</a>
      <a class="dl-btn" id="dl-json" href="#">Download JSON</a>
    </div>
  </div>

  <footer>Powered by <a href="https://www.siliconmango.com" style="color:var(--accent-strong)">Silicon Mango</a></footer>
</div>

<script>
const form = document.getElementById('scrape-form');
const errorBox = document.getElementById('error');
const progressSection = document.getElementById('progress');
const progressText = document.getElementById('progress-text');
const progressFill = document.getElementById('progress-fill');
const progressDetail = document.getElementById('progress-detail');
const downloadLinks = document.getElementById('download-links');
const submitBtn = document.getElementById('submit-btn');
const dlXlsx = document.getElementById('dl-xlsx');
const dlCsv = document.getElementById('dl-csv');
const dlJson = document.getElementById('dl-json');
let eventSource = null;

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.hidden = false;
}
function hideError() {
  errorBox.hidden = true;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();
  const prompt = document.getElementById('prompt').value.trim();
  const maxJobs = parseInt(document.getElementById('max-jobs').value) || 100;
  if (!prompt) { showError('Please enter a job description.'); return; }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Scraping...';
  progressSection.hidden = false;
  downloadLinks.hidden = true;
  progressFill.style.width = '0%';
  progressText.textContent = 'Parsing your request...';
  progressDetail.textContent = '';

  try {
    const res = await fetch('/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, max_jobs: maxJobs }),
    });
    const data = await res.json();
    if (data.error) { showError(data.error); reset(); return; }

    const runId = data.run_id;
    dlXlsx.href = `/download/${runId}/xlsx`;
    dlCsv.href = `/download/${runId}/csv`;
    dlJson.href = `/download/${runId}/json`;

    eventSource = new EventSource(`/stream/${runId}`);
    eventSource.onmessage = (event) => {
      try {
        const p = JSON.parse(event.data);
        if (p.error) { showError(p.error); reset(); return; }
        if (p.status === 'done' || p.collected >= p.target) {
          progressFill.style.width = '100%';
          progressText.textContent = `Done! ${p.collected || '?'} jobs collected.`;
          progressDetail.textContent = '';
          downloadLinks.hidden = false;
          eventSource.close();
          reset(false);
          return;
        }
        const pct = p.target ? Math.round((p.collected / p.target) * 100) : 0;
        progressFill.style.width = pct + '%';
        progressText.textContent = `${p.collected || 0} / ${p.target || '?'} jobs found`;
        progressDetail.textContent = p.current_query
          ? `Searching: "${p.current_query}" in ${p.current_location || 'anywhere'}`
          : '';
      } catch (_) {}
    };
    eventSource.onerror = () => { showError('Connection lost. Check run status.'); reset(); };
  } catch (err) {
    showError('Failed to start scrape: ' + err.message);
    reset();
  }
});

function reset(clearProgress = true) {
  submitBtn.disabled = false;
  submitBtn.textContent = 'Start Scraping';
  if (eventSource) { eventSource.close(); eventSource = null; }
  if (clearProgress) progressSection.hidden = true;
}
</script>
</body>
</html>
